{% assign docs = site.data.resources[include.subject.id] %}

<a class="subject-card" href="/subjects/{{ include.subject.id }}/">

    <div class="subject-icon">
        {{ include.subject.icon }}
    </div>

    <h3>{{ include.subject.name }}</h3>

    <p class="resource-count">
        {{ docs.size }} Resources
    </p>

</a>
